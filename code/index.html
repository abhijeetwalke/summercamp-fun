<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summer Camp</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/wa.css?v=11"><!-- World Awareness subject (scoped under .wa-scope); ?v bumps to bust caches -->
  <link rel="stylesheet" href="css/hoops.css?v=6"><!-- Basketball "Hardwood" subject (scoped under .hoops-scope) -->
  <link rel="stylesheet" href="css/sunsword.css?v=4"><!-- The Sun & the Sword subject (scoped under .sunsword-scope) -->
</head>
<body>
  <div id="app"></div>

  <!-- Supabase client (accounts + cloud progress sync) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Data ships as .js (not fetched .json) so the app works from file:// -->
  <script src="js/config.js"></script>
  <script src="data/math.bank.js"></script>
  <script src="js/state.js"></script>
  <script src="js/journey.js"></script>
  <script src="js/art.js"></script>
  <script src="js/modules.js"></script>
  <script src="js/map.js"></script>
  <script src="js/engine.js"></script>

  <!-- World Awareness subject: data + engine (renders into #app under #/world). ?v bumps to bust caches. -->
  <script src="js/wa/wa.content.js?v=11"></script>
  <script src="js/wa/wa.countries.js?v=11"></script>
  <script src="js/wa/wa.state.js?v=11"></script>
  <script src="js/wa/wa.components.js?v=11"></script>
  <script src="js/wa/wa.engine.js?v=11"></script>

  <!-- Basketball "Hardwood" subject: data + engine (renders into #app under #/hoops). -->
  <script src="js/hoops/hoops.content.js?v=6"></script>
  <script src="js/hoops/hoops.state.js?v=6"></script>
  <script src="js/hoops/hoops.components.js?v=6"></script>
  <script src="js/hoops/hoops.engine.js?v=6"></script>

  <!-- The Sun & the Sword subject: the ancient world (renders into #app under #/sunsword). -->
  <script src="js/sunsword/sunsword.content.js?v=4"></script>
  <script src="js/sunsword/sunsword.state.js?v=4"></script>
  <script src="js/sunsword/sunsword.components.js?v=4"></script>
  <script src="js/sunsword/sunsword.engine.js?v=4"></script>

  <!-- Cloud accounts + progress sync (login gate runs before the app) -->
  <script src="js/cloud.js?v=2"></script>
  <script src="js/app.js"></script>
</body>
</html>
